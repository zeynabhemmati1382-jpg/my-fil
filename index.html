<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | مدیریت کارهای روزانه</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- سایدبار چپ با تقویم -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-check-double"></i>
                <span>Task<span>Flow</span></span>
            </div>

            <!-- تقویم نمایشی حرفه‌ای -->
            <div class="calendar-wrapper">
                <div class="calendar-nav">
                    <button id="prevMonth"><i class="fas fa-chevron-right"></i></button>
                    <h3 id="monthYear"></h3>
                    <button id="nextMonth"><i class="fas fa-chevron-left"></i></button>
                </div>
                <div class="calendar-weekdays">
                    <span>ش</span><span>ی</span><span>د</span><span>س</span><span>چ</span><span>پ</span><span>ج</span>
                </div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>

            <!-- آمار خلاصه در سایدبار -->
            <div class="sidebar-stats">
                <div class="sidebar-stat">
                    <i class="fas fa-hourglass-half"></i>
                    <span id="sidePending">0</span>
                    <small>باقی‌مانده</small>
                </div>
                <div class="sidebar-stat">
                    <i class="fas fa-check-circle"></i>
                    <span id="sideDone">0</span>
                    <small>انجام شده</small>
                </div>
            </div>
        </aside>

        <!-- بخش اصلی -->
        <main class="main">
            <!-- هدر با تاریخ و پیام انگیزشی -->
            <div class="main-header">
                <div class="greeting-section">
                    <h1 id="greetingText">روزت پر از انرژی ✨</h1>
                    <div class="date-badge">
                        <i class="fas fa-calendar-alt"></i>
                        <span id="weekday"></span>
                        <span id="persianDate"></span>
                    </div>
                </div>
                <div class="motivation-card" id="motivationMsg">
                    <i class="fas fa-sparkle"></i>
                    <span>تمرکز کلید موفقیت است</span>
                </div>
            </div>

            <!-- کارت آمار اصلی -->
            <div class="stats-container">
                <div class="stat-card blue">
                    <div class="stat-icon"><i class="fas fa-list-ul"></i></div>
                    <div class="stat-details">
                        <span class="stat-value" id="totalTasks">0</span>
                        <span class="stat-label">کل کارها</span>
                    </div>
                </div>
                <div class="stat-card orange">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-details">
                        <span class="stat-value" id="pendingTasks">0</span>
                        <span class="stat-label">باقی‌مانده</span>
                    </div>
                </div>
                <div class="stat-card green">
                    <div class="stat-icon"><i class="fas fa-check-double"></i></div>
                    <div class="stat-details">
                        <span class="stat-value" id="doneTasks">0</span>
                        <span class="stat-label">انجام شده</span>
                    </div>
                </div>
            </div>
			<!-- فرم افزودن کار -->
            <div class="add-task-bar">
                <input type="text" id="taskInput" placeholder="یک کار جدید اضافه کنید...">
                <button id="addBtn"><i class="fas fa-plus"></i> افزودن</button>
            </div>

            <!-- فیلتر و جستجو -->
            <div class="filter-bar">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">همه</button>
                    <button class="filter-btn" data-filter="pending">باقی‌مانده</button>
                    <button class="filter-btn" data-filter="completed">انجام شده</button>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="جستجوی کارها...">
                </div>
            </div>

            <!-- لیست کارها -->
            <div class="tasks-container">
                <div class="tasks-header">
                    <h3><i class="fas fa-tasks"></i> کارهای من</h3>
                    <span id="tasksCount"></span>
                </div>
                <ul class="tasks-list" id="taskList"></ul>
            </div>
        </main>
    </div>

    <!-- مودال ادیت کار -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-pen"></i> ویرایش کار</h3>
                <button class="modal-close">&times;</button>
            </div>
            <input type="text" id="editInput" placeholder="عنوان کار">
            <button id="saveEditBtn" class="save-btn">ذخیره تغییرات</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
